# wrangler.toml — Cloudflare Workers static-assets deploy config. Adapted
# from clint-engine/templates/wrangler.toml, but with `directory = "./dist"`
# instead of the template's `"./"` — Space Builders is a Vite-built game
# (`npm run build` first), same as netrunner/mail, the Vite-path precedent
# this migration follows. Keep this file version-controlled — an
# ungitignored deploy config is how a fresh clone stays deployable
# (game-house-style SKILL.md's "Deploy config is code" gotcha). dist/
# itself stays gitignored (build output, regenerated by `npm run build`).
#
# `_headers`/`.assetsignore` live under public/ (public/_headers,
# public/.assetsignore), NOT next to this file — Cloudflare only reads
# them from INSIDE the configured [assets] directory, and Vite's
# public-dir copy is what carries them into dist/ on every build. See
# public/_headers for the actual caching rules (verified against a real
# `npm run build`).
name = "space-builders"
compatibility_date = "2026-06-01"

[assets]
directory = "./dist"

# --- Worker backend ------------------------------------------------------
# Space Builders is pure static assets, single-player, no server component
# (Phase 6's adoption matrix: "core only (Three.js, single-player)" — no
# net/ layer for this pilot). Nothing below this line is needed; see
# clint-engine/templates/wrangler.toml for the commented-out shape if a
# future phase ever adds one.
